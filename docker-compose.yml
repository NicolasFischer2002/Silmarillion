services:
  frontend:
    build:
      context: ./Frontend
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /src/Source/Contexts/UserContext/UserContext.Api
    volumes:
      - ./Backend:/src
    ports:
      - "5000:5000"
    command: dotnet run --urls=http://0.0.0.0:5000
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silmarillion -d SilmarillionDb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: